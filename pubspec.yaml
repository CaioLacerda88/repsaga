name: repsaga
description: "RepSaga - Track every rep, every time."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  supabase_flutter: ^2.5.0
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.0
  go_router: ^17.0.0
  freezed_annotation: ^3.0.0
  json_annotation: ^4.11.0
  hive: ^2.2.0
  hive_flutter: ^1.1.0
  cached_network_image: ^3.4.1
  flutter_dotenv: ^6.0.0
  flutter_markdown_plus: ^1.0.3
  flutter_svg: ^2.0.10+1
  google_fonts: ^6.2.0
  intl: ^0.20.0
  uuid: ^4.5.1
  wakelock_plus: ^1.2.8
  sentry_flutter: ^9.16.1
  clock: ^1.1.1
  connectivity_plus: ^6.1.0
  # Web-only DOM event subscriptions (window.online / window.offline) for the
  # OfflineBanner. Imported via a conditional import in
  # `lib/core/connectivity/web_online_events_web.dart`; native builds resolve
  # the stub `web_online_events_io.dart` and never link `package:web`.
  web: ^1.1.1
  fl_chart: ^1.1.0
  package_info_plus: ^9.0.1 # Pinned: 10.x requires Dart SDK newer than 3.11.4
  # Used for `firstWhereOrNull` in `active_workout_screen.dart` (PR3 review W1)
  # — the previous `firstWhere(orElse: () => after.last)` silently returned the
  # wrong element when no diff entry was found, which would corrupt undo state
  # the moment `addExercise` becomes async.
  collection: ^1.18.0
  # Transitive pins: meta (1.17→1.18) and vector_math (2.2→2.3) are held back
  # by the Flutter SDK itself — no action until Flutter upgrades them.

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.0
  riverpod_generator: ^4.0.0
  freezed: ^3.0.0
  json_serializable: ^6.8.0
  mocktail: ^1.0.5
  fake_async: ^1.3.3
  # Exposed directly by wakelock_plus for testing — we reference
  # WakelockPlusPlatformInterface from test fakes.
  wakelock_plus_platform_interface: ^1.4.0
  flutter_launcher_icons: ^0.14.1
  # Used by integration tests (test/integration/) to call Supabase Admin API
  # for test-user creation/deletion. Already a transitive dep of
  # supabase_flutter; listed here explicitly to satisfy the linter.
  http: ^1.0.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - .env
    - assets/app_icon/
    # Google logo used by the Google sign-in button; the v3-silhouette pack
    # holds every other app icon. ATTRIBUTION.md / COVERAGE.md under
    # assets/icons/ are documentation — not bundled.
    - assets/icons/google_logo.svg
    - assets/icons/v3-silhouette/
    - assets/legal/
    # Phase 18c: per-body-part title catalog (78 entries). Slugs only — display
    # copy lives in lib/l10n/app_*.arb keyed by `title_{slug}_name|_flavor`.
    - assets/rpg/titles_v1.json
    # Phase 18e: character-level (7) + cross-build (5) title catalogs. Each
    # entry carries a `kind` discriminator so `Title.fromJson` dispatches to
    # the correct sealed-union variant (BodyPartTitle / CharacterLevelTitle /
    # CrossBuildTitle).
    - assets/rpg/titles_character_level.json
    - assets/rpg/titles_cross_build.json
    # Bundled Rajdhani (display) + Inter (body) TTFs. Both families are ALSO
    # declared under `flutter.fonts:` below so Flutter's native font loader
    # registers them synchronously at app start. `AppTextStyles` reads them
    # via direct `TextStyle(fontFamily: ...)` — google_fonts is only kept as
    # a fallback for any legacy call site, and `GoogleFonts.config
    # .allowRuntimeFetching` is locked to false in `main.dart` so a missing
    # bundled weight raises a clear error instead of silently network-fetching
    # (the silent-fetch race was the Phase 27 L14 root cause).
    - assets/fonts/

  fonts:
    - family: Rajdhani
      fonts:
        - asset: assets/fonts/Rajdhani-Medium.ttf
          weight: 500
        - asset: assets/fonts/Rajdhani-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Rajdhani-Bold.ttf
          weight: 700
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600

flutter_launcher_icons:
  image_path: "assets/app_icon/arcane_sigil_1024.png"
  android: "ic_launcher"
  min_sdk_android: 21
  adaptive_icon_background: "#0D0319"
  adaptive_icon_foreground: "assets/app_icon/arcane_sigil_foreground.png"
  remove_alpha_ios: false
  web:
    generate: true
    image_path: "assets/app_icon/arcane_sigil_1024.png"
    background_color: "#0D0319"
    theme_color: "#B36DFF"
