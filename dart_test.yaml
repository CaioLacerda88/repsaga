# dart_test config — declares custom tags so package:test does not warn.
#
# `integration` tag: marks tests in `test/integration/` that require a live
# local Supabase instance (`npx supabase start`). They are EXCLUDED from
# the default `flutter test` run (`make test` and CI) and run separately
# via `make test-integration` / `flutter test --tags integration`.
tags:
  integration:
    skip: false
  # `golden` tag: marks pixel-comparison golden tests. EXCLUDED from
  # `make test` / CI because golden images are byte-sensitive to host
  # platform sub-pixel font rendering (Linux freetype vs Windows
  # DirectWrite vs macOS CoreText) and the project has not established a
  # canonical baking platform yet. Run with `flutter test --tags golden`
  # to verify the locked visual contract on the same host that baked the
  # goldens (see `test/helpers/tolerant_golden_comparator.dart` for the
  # tolerance policy when running cross-host).
  golden:
    skip: false
