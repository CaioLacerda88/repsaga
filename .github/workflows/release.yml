name: Release

on:
  push:
    tags: ['v*']

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-release:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: temurin

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.41.6'

      # ── Keystore injection ───────────────────────────────────────────────
      # Decodes the base64-encoded keystore from the secret and writes
      # android/key.properties so build.gradle.kts picks up the release
      # signingConfig.  Both paths are gitignored (root .gitignore:
      # android/keystore/, android/key.properties, **/*.jks).
      - name: Inject release keystore
        run: |
          mkdir -p android/keystore
          printf '%s' "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" \
            | base64 --decode > android/keystore/upload-keystore.jks
          printf 'storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=keystore/upload-keystore.jks\n' \
            "${{ secrets.ANDROID_STORE_PASSWORD }}" \
            "${{ secrets.ANDROID_KEY_PASSWORD }}" \
            "${{ secrets.ANDROID_KEY_ALIAS }}" \
            > android/key.properties

      # ── Prod environment ─────────────────────────────────────────────────
      # Writes the real production .env so the app connects to the hosted
      # Supabase instance and Sentry initializes (initSentryAndRun no-ops on
      # an empty DSN — see lib/core/observability/sentry_init.dart).
      # Keys match the names dotenv.load() reads in lib/main.dart.
      - name: Write production .env
        run: |
          printf 'SUPABASE_URL=%s\nSUPABASE_ANON_KEY=%s\nSENTRY_DSN=%s\n' \
            "${{ secrets.PROD_SUPABASE_URL }}" \
            "${{ secrets.PROD_SUPABASE_ANON_KEY }}" \
            "${{ secrets.SENTRY_DSN }}" \
            > .env

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      # ── Release builds ───────────────────────────────────────────────────
      # AAB for Google Play (required format).  APKs for the GitHub release
      # direct-download (users sideloading or testing without Play).
      # --obfuscate + --split-debug-info write symbol maps to build/debug-info
      # so crash stacks can be symbolicated using the artifact uploaded below.
      - name: Build release AAB (Play)
        run: >
          flutter build appbundle
          --release
          --obfuscate
          --split-debug-info=build/debug-info

      - name: Build release APKs (GitHub release)
        run: >
          flutter build apk
          --release
          --split-per-abi
          --obfuscate
          --split-debug-info=build/debug-info

      # ── Zip debug-info for GitHub release artifact ───────────────────────
      - name: Zip debug-info symbols
        run: zip -r build/debug-info.zip build/debug-info

      # ── Google Play upload (internal track) ──────────────────────────────
      # Gated on PLAY_SERVICE_ACCOUNT_JSON being present so a tag pushed
      # without Play secrets still produces the GitHub release rather than
      # hard-failing.  Internal track: no auto-promotion to alpha/beta/prod.
      # Promote manually in Play Console after QA sign-off.
      - name: Check Play service-account secret presence
        id: play-gate
        run: |
          if [ -n "${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "PLAY_SERVICE_ACCOUNT_JSON not set — skipping Play upload."
          fi

      - name: Upload AAB to Play (internal track)
        if: steps.play-gate.outputs.present == 'true'
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.repsaga.app
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: internal
          status: completed

      # ── GitHub release ───────────────────────────────────────────────────
      # Attaches the signed split APKs + the debug-info zip (for stack
      # symbolication).  prerelease = true for alpha/beta tags.
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-x86_64-release.apk
            build/debug-info.zip
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
