name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  exercise-translation-coverage-check:
    name: exercise-translation-coverage-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # Fetch enough history to diff against the PR base / main head.
          fetch-depth: 0

      - name: Verify default-exercise inserts are paired with en+pt translations
        run: |
          # On PRs, diff against the PR base. On pushes to main, diff against
          # the previous commit so the check runs incrementally.
          if [ -n "${GITHUB_BASE_REF}" ]; then
            git fetch --no-tags --depth=1 origin "${GITHUB_BASE_REF}"
            base="origin/${GITHUB_BASE_REF}"
          else
            base="HEAD~1"
          fi
          bash scripts/check_exercise_translation_coverage.sh "${base}"

  exercise-difficulty-mult-coverage-check:
    name: exercise-difficulty-mult-coverage-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # Fetch enough history to diff against the PR base / main head.
          fetch-depth: 0

      - name: Verify default-exercise inserts are paired with difficulty_mult assignments
        # Phase 24a — see scripts/check_exercise_difficulty_mult_coverage.sh
        # docstring for rationale. Sibling to the translation-coverage check.
        run: |
          if [ -n "${GITHUB_BASE_REF}" ]; then
            git fetch --no-tags --depth=1 origin "${GITHUB_BASE_REF}"
            base="origin/${GITHUB_BASE_REF}"
          else
            base="HEAD~1"
          fi
          bash scripts/check_exercise_difficulty_mult_coverage.sh "${base}"

  workout-template-translation-coverage-check:
    name: workout-template-translation-coverage-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # Fetch enough history to diff against the PR base / main head.
          fetch-depth: 0

      - name: Verify default-template slugs are paired with en+pt translations
        # Phase 32 PR 32a — see
        # scripts/check_workout_template_translation_coverage.sh docstring
        # for rationale. Sibling to the exercise-translation-coverage check.
        run: |
          if [ -n "${GITHUB_BASE_REF}" ]; then
            git fetch --no-tags --depth=1 origin "${GITHUB_BASE_REF}"
            base="origin/${GITHUB_BASE_REF}"
          else
            base="HEAD~1"
          fi
          bash scripts/check_workout_template_translation_coverage.sh "${base}"

  analyze:
    runs-on: ubuntu-latest
    # Both content-coverage gates must pass before we spend cycles on
    # analyze/test/build. PR #222 reviewer Warning: keep symmetry with the
    # `ci` aggregator's `needs` list so a failing difficulty-mult gate
    # short-circuits the pipeline at the same point as a failing
    # translation gate.
    needs: [exercise-translation-coverage-check, exercise-difficulty-mult-coverage-check, workout-template-translation-coverage-check]
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.41.6'
          cache: true
          cache-key: flutter-${{ runner.os }}-3.41.6

      - name: Cache Flutter pub packages
        uses: actions/cache@v5
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Create .env placeholder
        run: cp .env.example .env

      - name: Install dependencies
        run: flutter pub get

      - name: Check formatting
        run: dart format --set-exit-if-changed .

      - name: Run build_runner
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze
        run: dart analyze --fatal-infos

      - name: Check typography call sites
        # Phase 27 L18.4 — fails the build on any raw
        # `TextStyle(fontFamily: 'Rajdhani', ...)` literal under
        # `lib/features/` or `lib/shared/`. Forces all Rajdhani usage
        # through the sanctioned `AppTextStyles.numeric` / `.headline`
        # / `.display` / `.titleDisplay` entry points so token
        # promotions stay deterministic. See script header for the
        # historical context (five sweeps in one phase).
        run: bash scripts/check_typography_call_sites.sh

      - name: Check reward-accent scarcity
        # Quarantines `heroGold` rendering to a single sanctioned widget
        # (`RewardAccent`) per the Arcane Ascent reward-scarcity framework
        # (§17.0c). The script was wired locally into `make analyze`
        # since Phase 26d but only landed in CI in PR 30b — Phase 30a
        # shipped four heroGold leaks that `make analyze` would have
        # caught had any author run it locally. CI now blocks the
        # same class of leak. See script header for opt-out grammar
        # (`// ignore: reward_accent — <reason>`).
        run: bash scripts/check_reward_accent.sh

      - name: Check hardcoded colors
        # Fails on any out-of-palette literal (`Color(0x…)`,
        # `Colors.black*`, `Colors.white*`) under `lib/features/`. Same
        # CI gap as the reward-accent gate above: wired locally into
        # `make analyze` but never run in CI until PR 30b. Allowed
        # palette tokens live in `lib/core/theme/app_theme.dart`
        # (`AppColors.*`). See script header for opt-out grammar.
        run: bash scripts/check_hardcoded_colors.sh

      - name: Check no dart:developer.log in workouts/rpg
        # Phase 32 PR 32g — enforces cluster
        # `developer-log-invisible-logcat`: `dart:developer.log` is
        # INVISIBLE on `adb logcat` (writes to Dart VM developer stream
        # only) so on-device triage of "save failed" / "celebration
        # didn't fire" is impossible. Replace with
        # `debugPrint('[Scope] msg')`. See script header for the gate
        # scope + remediation hint.
        run: bash scripts/check_no_developer_log.sh

  test:
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.41.6'
          cache: true
          cache-key: flutter-${{ runner.os }}-3.41.6

      - name: Cache Flutter pub packages
        uses: actions/cache@v5
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Create .env placeholder
        run: cp .env.example .env

      - name: Install dependencies
        run: flutter pub get

      - name: Run build_runner
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Run tests
        # Integration tests under test/integration/ require a live local
        # Supabase instance and are tagged `integration` so they are
        # excluded here. Run them locally via `make test-integration`.
        run: flutter test --coverage --exclude-tags integration

      - name: Check coverage floor
        # Phase 38.9 T2.1 — self-contained line-coverage gate (no external
        # service or secret). Parses the lcov.info produced by the step above
        # and fails if overall line coverage drops below the committed floor.
        # The floor is stored in the script itself; see
        # scripts/check_coverage_floor.sh header for how to raise it.
        run: bash scripts/check_coverage_floor.sh

  build:
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.41.6'
          cache: true
          cache-key: flutter-${{ runner.os }}-3.41.6

      - name: Cache Flutter pub packages
        uses: actions/cache@v5
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Create .env placeholder
        run: cp .env.example .env

      - name: Install dependencies
        run: flutter pub get

      - name: Run build_runner
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build APK (debug)
        run: flutter build apk --debug

      - name: Build web
        run: flutter build web

  integration-test:
    # Integration tests require a live local Supabase instance. They were
    # excluded from the `test` job (--exclude-tags integration) and only ran
    # locally, so the suite rotted to 18 failures undetected until the 38c
    # review (#339 repaired it). This job closes that gap: every PR now boots
    # Supabase, applies all migrations, and runs the tagged suite so a broken
    # integration path fails the pipeline immediately.
    #
    # Follows the e2e.yml Supabase-boot pattern (setup-cli → start → status →
    # write .env → wait-for-ready probes) but needs LESS than e2e: no
    # service-role key, no test/e2e/.env.local, no web build/serve. `supabase
    # start` auto-applies supabase/migrations/ so the explicit GRANT migration
    # that fixed the supabase-cli-latest-grant-drift cluster is always in
    # place; no redundant grants needed here.
    #
    # NOTE on creds: the integration suite does NOT read this .env at runtime —
    # test/integration/rpg_integration_setup.dart hardcodes the local-demo URL +
    # anon + service-role keys (the deterministic keys `supabase start` always
    # produces) and talks to 127.0.0.1:54321 directly. We still write .env below
    # for two unrelated reasons: pubspec.yaml declares `.env` as a Flutter asset
    # (so `flutter test` errors if the file is absent), and the REST
    # wait-for-ready probe authenticates with the real local anon key.
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: analyze
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.41.6'
          cache: true
          cache-key: flutter-${{ runner.os }}-3.41.6

      - name: Cache Flutter pub packages
        uses: actions/cache@v5
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Start local Supabase
        run: supabase start

      - name: Extract Supabase keys and write .env
        run: |
          supabase status -o env > /tmp/sb_status.env
          # `tr -d '"'` defensively strips surrounding quotes. Newer Supabase
          # CLIs quote `status -o env` values (`API_URL="http://..."`);
          # stripping keeps the .env clean and version-proof regardless of
          # the CLI's quoting behavior.
          SB_URL=$(grep '^API_URL=' /tmp/sb_status.env | cut -d= -f2- | tr -d '"')
          SB_ANON=$(grep '^ANON_KEY=' /tmp/sb_status.env | cut -d= -f2- | tr -d '"')

          echo "--- Supabase API URL: $SB_URL ---"

          # Written for the declared Flutter `.env` asset + the REST probe's
          # apikey — NOT consumed by the tests themselves (see job header note).
          printf "SUPABASE_URL=%s\nSUPABASE_ANON_KEY=%s\n" "$SB_URL" "$SB_ANON" > .env

      - name: Wait for Supabase to be fully ready
        run: |
          echo "Waiting for Supabase services to be fully ready..."
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:54321/auth/v1/settings > /dev/null 2>&1; then
              echo "Auth endpoint ready on attempt $i"
              break
            fi
            echo "Waiting for auth endpoint... (attempt $i/30)"
            sleep 2
            if [ "$i" -eq 30 ]; then echo "ERROR: Supabase auth endpoint never became ready"; exit 1; fi
          done
          for i in $(seq 1 15); do
            if curl -sf http://127.0.0.1:54321/rest/v1/ -H "apikey: $(grep SUPABASE_ANON_KEY .env | cut -d= -f2-)" > /dev/null 2>&1; then
              echo "REST API ready on attempt $i"
              break
            fi
            echo "Waiting for REST API... (attempt $i/15)"
            sleep 2
            if [ "$i" -eq 15 ]; then echo "ERROR: Supabase REST API never became ready"; exit 1; fi
          done
          echo "Supabase URL: $(head -1 .env)"

      - name: Install dependencies
        run: flutter pub get

      - name: Run build_runner
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Run integration tests
        # No --coverage: the integration suite is I/O-heavy against a real
        # Supabase stack; coverage instrumentation adds overhead with no
        # benefit here (unit/widget coverage lives in the `test` job).
        run: flutter test --tags integration

  deno-tests:
    # Edge Function unit tests (Deno). The handlers under
    # supabase/functions/**/ ship with self-contained `*.test.ts` files
    # (vitality-nightly auth gate, _shared/google_play helpers). Without
    # this job they only ran locally on the author's machine — a regression
    # in google_play.ts (subscription validation) or vitality-nightly's
    # auth gate would slip into a deploy with no CI signal.
    #
    # Independent of the Flutter pipeline (no Flutter SDK needed) so this
    # runs in parallel with `analyze` / `test` / `build`. The `ci`
    # aggregator below depends on this job's success.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - uses: denoland/setup-deno@v2
        with:
          # Pinned to a specific 1.x release rather than the floating
          # `v1.x` range — `setup-deno@v2`'s version resolver can be
          # finicky with floating ranges. 1.46.3 aligns with the Supabase
          # Edge Runtime's bundled Deno (mid-2024 stable). Bump together
          # with supabase-cli's deno version to avoid drift between local
          # supabase-runtime and CI. Do NOT jump to 2.x without first
          # verifying `https://deno.land/std@0.224.0/...` URL imports
          # still resolve — the std lib URLs the tests use are
          # 1.x-compatible.
          deno-version: "1.46.3"

      - name: Cache Deno deps
        uses: actions/cache@v5
        with:
          # Hash all .ts files under supabase/functions/ (handlers + tests)
          # so a change to ANY imported module busts the cache and forces
          # re-download of any new dependencies — a narrower hash on just
          # `*.test.ts` would leave stale handler-import caches around.
          path: |
            ~/.cache/deno
          key: deno-${{ runner.os }}-${{ hashFiles('supabase/functions/**/*.ts') }}
          restore-keys: deno-${{ runner.os }}-

      - name: Run Deno tests
        # Explicit `**/*.test.ts` glob targets the test files only —
        # running `deno test supabase/functions/` would walk the whole
        # tree and try to load handler `index.ts` entry points, which
        # import Edge-Runtime-only globals (`Deno.serve`, etc.) absent
        # from plain Deno and produce noisy import-time errors.
        #
        # `--allow-net` is for the mocked JWKs server `google_play.test.ts`
        # spins up locally + the `verifyPubSubJwt` code path's `fetch`
        # call (Deno checks the permission flag at call time even when
        # the actual URL is intercepted by a fetch stub). `--allow-env`
        # is required by both tests (`google_play.test.ts` reads
        # `SERVICE_ACCOUNT_JSON`; `auth.test.ts` indirectly triggers
        # `index.ts`'s `SUPABASE_URL` read on module load).
        env:
          # `vitality-nightly/index.ts` fails loud at module load when
          # `SUPABASE_URL` is unset — that's intentional production
          # behavior (a deployment without this env is broken and we
          # want a boot error, not a silent blank Allow-Origin). The
          # auth tests import from `./index.ts`, so the import alone
          # triggers the check. Provide a dummy URL — the test JWT
          # payload is not making real HTTP calls; only the module-load
          # `new URL(...)` / string parse needs to succeed.
          SUPABASE_URL: http://localhost:54321
        run: deno test --allow-net --allow-env "supabase/functions/**/*.test.ts"

  rls-tests:
    # Cross-user RLS isolation gate (Phase 38.9 T1.3). RLS is ENABLEd on every
    # user-data table but, until this job existed, nothing verified the
    # policies' BEHAVIOR — that user A cannot read/write user B's rows. This
    # closes the #1 audit gap AND pins the current isolation contract so the
    # first cross-user RLS in Phase 40 can't silently widen read access.
    #
    # APPROACH: pgTAP via `supabase test db` against the LOCAL Supabase the
    # pipeline already boots — NOT a hosted test instance (the previous
    # commented stub needed TEST_SUPABASE_* secrets that don't exist). Tests
    # live in supabase/tests/*.sql and are wholly self-contained / secret-free.
    # `supabase test db` runs each file in a transaction it rolls back, so the
    # two seeded auth users never persist.
    #
    # Mirrors the integration-test Supabase-boot pattern (setup-cli@latest →
    # start → wait-for-ready probe) but needs NO Flutter: pgTAP runs entirely
    # in Postgres. `supabase start` auto-applies supabase/migrations/, so the
    # explicit GRANT migration that fixed the supabase-cli-latest-grant-drift
    # cluster is always in place — a regression there would fail the positive
    # (own-row) assertions with 42501 rather than passing silently.
    #
    # A RED run here is a real RLS hole (one user reading/writing another's
    # data), never a flaky test — the fix is the policy, never the assertion.
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Start local Supabase
        run: supabase start

      - name: Wait for Supabase database to be ready
        run: |
          echo "Waiting for Supabase REST API to be ready..."
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:54321/auth/v1/settings > /dev/null 2>&1; then
              echo "Auth endpoint ready on attempt $i"
              break
            fi
            echo "Waiting for auth endpoint... (attempt $i/30)"
            sleep 2
            if [ "$i" -eq 30 ]; then echo "ERROR: Supabase never became ready"; exit 1; fi
          done

      - name: Run RLS isolation tests (pgTAP)
        # Runs every supabase/tests/*.sql via pg_prove. Exits non-zero on any
        # `not ok` assertion OR a plan-count mismatch — both fail the pipeline.
        run: supabase test db

  layering-check:
    # Phase 38.9 T2.3 — architectural layering gate.
    # Fails if any Dart file under lib/ OUTSIDE a data/ directory contains a
    # Supabase table call (.from('…')) or RPC call (.rpc('…')) in
    # string-literal form. This enforces that all data-access logic lives in
    # repository classes (lib/**/data/) and does not leak into providers,
    # widgets, or domain models.
    #
    # Pure bash/grep — no Flutter SDK needed. Runs in parallel with analyze/
    # test/build to avoid adding to the critical path.
    #
    # The only current allowed exception is lib/core/offline/health_check_provider.dart
    # (infra connectivity probe — see script ALLOW_LIST and its documented
    # justification). All other files outside data/ must not call .from() or
    # .rpc() with string literal arguments.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Check no Supabase calls outside data layer
        run: bash scripts/check_no_supabase_outside_data.sh

  osv-scanner:
    # Phase 38.9 T2.2 — dependency vulnerability scanning.
    # Scans pubspec.lock with osv-scanner to detect known vulnerabilities in
    # Flutter/Dart transitive dependencies. Uses the official Google OSV
    # Scanner GitHub Action.
    #
    # Pre-existing advisories with no available fix are ignored via
    # .osv-scanner.toml so they don't block main spuriously. Any new advisory
    # that ships a fixed version will trip this gate and must be resolved.
    #
    # Runs in parallel with other jobs (no Flutter SDK needed).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Run OSV Scanner
        # Scans pubspec.lock for known vulnerabilities. Fails on any finding
        # that is NOT listed in .osv-scanner.toml (the ignore-list file).
        # Pre-existing advisories with no available fix belong in .osv-scanner.toml
        # with a dated comment and tracking URL — see that file's header.
        uses: google/osv-scanner-action/osv-scanner-action@v2.3.8
        with:
          scan-args: |-
            --config=.osv-scanner.toml
            --lockfile=pubspec.lock

  ci:
    name: ci
    runs-on: ubuntu-latest
    if: always()
    needs: [exercise-translation-coverage-check, exercise-difficulty-mult-coverage-check, workout-template-translation-coverage-check, analyze, test, build, deno-tests, integration-test, rls-tests, layering-check, osv-scanner]
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.exercise-translation-coverage-check.result }}" != "success" || \
                "${{ needs.exercise-difficulty-mult-coverage-check.result }}" != "success" || \
                "${{ needs.workout-template-translation-coverage-check.result }}" != "success" || \
                "${{ needs.analyze.result }}" != "success" || \
                "${{ needs.test.result }}" != "success" || \
                "${{ needs.build.result }}" != "success" || \
                "${{ needs.deno-tests.result }}" != "success" || \
                "${{ needs.integration-test.result }}" != "success" || \
                "${{ needs.rls-tests.result }}" != "success" || \
                "${{ needs.layering-check.result }}" != "success" || \
                "${{ needs.osv-scanner.result }}" != "success" ]]; then
            echo "One or more required jobs failed or were skipped"
            echo "  exercise-translation-coverage-check:        ${{ needs.exercise-translation-coverage-check.result }}"
            echo "  exercise-difficulty-mult-coverage-check:    ${{ needs.exercise-difficulty-mult-coverage-check.result }}"
            echo "  workout-template-translation-coverage-check:${{ needs.workout-template-translation-coverage-check.result }}"
            echo "  analyze:                                    ${{ needs.analyze.result }}"
            echo "  test:                                       ${{ needs.test.result }}"
            echo "  build:                                      ${{ needs.build.result }}"
            echo "  deno-tests:                                 ${{ needs.deno-tests.result }}"
            echo "  integration-test:                           ${{ needs.integration-test.result }}"
            echo "  rls-tests:                                  ${{ needs.rls-tests.result }}"
            echo "  layering-check:                             ${{ needs.layering-check.result }}"
            echo "  osv-scanner:                                ${{ needs.osv-scanner.result }}"
            exit 1
          fi
          echo "All required jobs passed"
