name: E2E Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.41.6'
          cache: true
          cache-key: flutter-${{ runner.os }}-3.41.6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: test/e2e/package-lock.json

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      # Cache Playwright browser binaries. Key includes the Playwright version
      # so the cache is invalidated when @playwright/test is upgraded.
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('test/e2e/package-lock.json') }}

      # Cache Flutter pub packages. Key is the pubspec.lock so a lockfile change
      # triggers a fresh download; otherwise we get a full cache hit.
      - name: Cache Flutter pub packages
        uses: actions/cache@v5
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      # Cache the Flutter web build output. Cache key covers all Dart/Flutter
      # source files so any code change busts it automatically.
      - name: Cache Flutter web build
        id: web-build-cache
        uses: actions/cache@v5
        with:
          path: build/web
          key: web-build-${{ runner.os }}-${{ hashFiles('lib/**', 'pubspec.lock', 'web/**') }}

      - name: Start local Supabase
        run: supabase start

      - name: Extract Supabase keys and write env files
        run: |
          supabase status -o env > /tmp/sb_status.env
          # `tr -d '"'` defensively strips surrounding quotes. Newer Supabase
          # CLIs quote `status -o env` values (`API_URL="http://..."`); flutter_
          # dotenv tolerates the quotes today (the green 06-10 run had them too,
          # so they are NOT the boot-hang cause — that was a grant regression,
          # see the migration in this PR), but stripping keeps the .env clean and
          # version-proof regardless of the CLI's quoting behavior.
          SB_URL=$(grep '^API_URL=' /tmp/sb_status.env | cut -d= -f2- | tr -d '"')
          SB_ANON=$(grep '^ANON_KEY=' /tmp/sb_status.env | cut -d= -f2- | tr -d '"')
          SB_SERVICE=$(grep '^SERVICE_ROLE_KEY=' /tmp/sb_status.env | cut -d= -f2- | tr -d '"')

          echo "--- Supabase API URL: $SB_URL ---"

          # Flutter app .env (loaded by flutter_dotenv at runtime)
          printf "SUPABASE_URL=%s\nSUPABASE_ANON_KEY=%s\n" "$SB_URL" "$SB_ANON" > .env

          # Playwright .env.local (loaded by global-setup.ts)
          printf "FLUTTER_APP_URL=http://localhost:8080\nSUPABASE_URL=%s\nSUPABASE_ANON_KEY=%s\nSUPABASE_SERVICE_ROLE_KEY=%s\nTEST_USER_PASSWORD=TestPassword123!\n" "$SB_URL" "$SB_ANON" "$SB_SERVICE" > test/e2e/.env.local

      - name: Wait for Supabase to be fully ready
        run: |
          echo "Waiting for Supabase services to be fully ready..."
          # Retry loop: check auth endpoint + ability to create a session.
          # supabase start returns before all services (especially Realtime and
          # GoTrue) are fully initialised. We probe until the auth API responds
          # to a real request, not just the settings endpoint.
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:54321/auth/v1/settings > /dev/null 2>&1; then
              echo "Auth endpoint ready on attempt $i"
              break
            fi
            echo "Waiting for auth endpoint... (attempt $i/30)"
            sleep 2
            # Hard-fail rather than fall through to a cryptic global-setup auth
            # error. Newly load-bearing under sharding: 3 parallel runners each
            # boot their own Supabase, so a Docker resource-pressure failure on
            # one shard must fail fast with a clear cause, not a 30-min timeout.
            if [ "$i" -eq 30 ]; then echo "ERROR: Supabase auth endpoint never became ready"; exit 1; fi
          done
          # Verify Supabase REST API is also reachable (PostgREST).
          for i in $(seq 1 15); do
            if curl -sf http://127.0.0.1:54321/rest/v1/ -H "apikey: $(grep SUPABASE_ANON_KEY .env | cut -d= -f2-)" > /dev/null 2>&1; then
              echo "REST API ready on attempt $i"
              break
            fi
            echo "Waiting for REST API... (attempt $i/15)"
            sleep 2
            if [ "$i" -eq 15 ]; then echo "ERROR: Supabase REST API never became ready"; exit 1; fi
          done
          echo "Supabase URL: $(head -1 .env)"

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Flutter web
        if: steps.web-build-cache.outputs.cache-hit != 'true'
        run: |
          flutter build web \
            --release \
            --no-tree-shake-icons \
            --no-web-resources-cdn

      - name: Ensure .env is in build output
        run: |
          # flutter_dotenv loads .env from the asset bundle. In web builds,
          # assets live at build/web/assets/. On cache hits the build step is
          # skipped, so we always copy the current .env into the build output
          # to guarantee the running app reads the correct Supabase keys.
          mkdir -p build/web/assets
          cp .env build/web/assets/.env
          echo ".env copied to build/web/assets/"
          cat build/web/assets/.env

      - name: Serve Flutter web app
        run: |
          node test/e2e/static-server.cjs build/web 8080 &
          npx wait-on http://localhost:8080 --timeout 30000

      - name: Install Playwright dependencies
        working-directory: test/e2e
        run: npm ci

      - name: Install Playwright browsers
        working-directory: test/e2e
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright browser system deps (cache hit)
        working-directory: test/e2e
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run Playwright tests
        working-directory: test/e2e
        run: npx playwright test --shard=${{ matrix.shard }}/3 --reporter=line

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report-${{ matrix.shard }}
          path: |
            test/e2e/playwright-report/
            test/e2e/test-results/
          retention-days: 7

  e2e-summary:
    needs: [e2e]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Report shard results
        run: |
          echo "E2E shard results: ${{ needs.e2e.result }}"
          if [ "${{ needs.e2e.result }}" != "success" ]; then
            echo "One or more E2E shards failed or were cancelled."
            exit 1
          fi
          echo "All E2E shards passed."
