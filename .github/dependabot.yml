# Dependabot auto-update configuration.
#
# Two ecosystems:
#   1. pub — Flutter/Dart package dependencies (pubspec.yaml / pubspec.lock).
#      Weekly schedule to avoid PR churn. Limit 5 open PRs to keep the queue
#      manageable; maintainers review + merge before new ones open.
#   2. github-actions — first-party Actions (actions/checkout, subosito/flutter-action,
#      etc.) pinned to major-version tags. Weekly bumps ensure we pick up
#      Node.js runtime upgrades automatically rather than drifting behind.
#      Limit 5 open PRs.
#
# Auto-updates only open PRs — they do NOT auto-merge. Each PR still goes
# through the normal CI pipeline (ci.yml) before a maintainer merges.
#
# Grouping: minor + patch updates are batched into a single PR per ecosystem
# (one "pub" PR, one "github-actions" PR) instead of one PR per package, to keep
# the queue quiet. MAJOR updates stay as individual PRs — they're more likely to
# carry breaking changes and deserve isolated review/CI.

version: 2

updates:
  - package-ecosystem: pub
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: "America/Sao_Paulo"
    open-pull-requests-limit: 5
    groups:
      pub-minor-patch:
        update-types:
          - "minor"
          - "patch"
    labels:
      - "dependencies"
      - "dart"
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: "America/Sao_Paulo"
    open-pull-requests-limit: 5
    groups:
      actions-all:
        update-types:
          - "minor"
          - "patch"
          - "major"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci(deps)"
