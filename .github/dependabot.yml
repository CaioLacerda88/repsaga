# Dependabot auto-update configuration.
#
# Two ecosystems:
#   1. pub — Flutter/Dart package dependencies (pubspec.yaml / pubspec.lock).
#      Weekly schedule to avoid PR churn. Limit 5 open PRs to keep the queue
#      manageable; maintainers review + merge before new ones open.
#   2. github-actions — first-party Actions (actions/checkout, subosito/flutter-action,
#      etc.) pinned to major-version tags. Weekly bumps ensure we pick up
#      Node.js runtime upgrades automatically rather than drifting behind.
#      Limit 5 open PRs.
#
# Auto-updates only open PRs — they do NOT auto-merge. Each PR still goes
# through the normal CI pipeline (ci.yml) before a maintainer merges.
#
# Grouping: minor + patch + major updates are batched into a single PR per
# ecosystem (one "pub" PR, one "github-actions" PR) instead of one PR per
# package, to keep the queue quiet. Batching majors too lets us validate all
# bumps TOGETHER in one CI run — the consolidated-batch workflow we adopted
# after the 2026-06 batch (majors validated as a set is faster and catches
# cross-dep interactions a per-package PR would miss).

version: 2

updates:
  - package-ecosystem: pub
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: "America/Sao_Paulo"
    open-pull-requests-limit: 5
    # Ignore versions we've DELIBERATELY held — otherwise dependabot re-proposes
    # them every run and the grouped pub PR fails CI forever. Each is documented
    # in pubspec.yaml + PROJECT.md §2. Re-evaluate (remove the ignore) when the
    # underlying blocker clears (Flutter SDK bumps meta to 1.18; the passkeys_web
    # boot issue is handled). NOTE: package_info_plus 10 was a FALSE blocker (its
    # "needs newer Dart SDK" comment was stale) — adopted via #399, ignore removed.
    ignore:
      # Web-boot crash via the passkeys_web transitive plugin (cluster
      # supabase-passkeys-web-boot-crash). Held at 2.12.x.
      - dependency-name: "supabase_flutter"
        versions: [">=2.15.0"]
      # 4.0.4 needs analyzer ^12 / meta ^1.18 — unsolvable vs flutter_test's
      # meta 1.17.0 on SDK 3.41.6. Blocks the riverpod/json codegen quartet below
      # (they transitively require the same analyzer/meta floor).
      - dependency-name: "riverpod_generator"
        versions: [">=4.0.4"]
      - dependency-name: "riverpod_annotation"
        versions: [">=4.0.3"]
      - dependency-name: "flutter_riverpod"
        versions: [">=3.3.2"]
      - dependency-name: "json_serializable"
        versions: [">=6.14.0"]
      - dependency-name: "json_annotation"
        versions: [">=4.12.0"]
    groups:
      pub-all:
        update-types:
          - "minor"
          - "patch"
          - "major"
    labels:
      - "dependencies"
      - "dart"
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: "America/Sao_Paulo"
    open-pull-requests-limit: 5
    groups:
      actions-all:
        update-types:
          - "minor"
          - "patch"
          - "major"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci(deps)"
